name: Build Custom Mesa Turnip Adreno 720

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Minimal Repo
      uses: actions/checkout@v4

    - name: Setup Android NDK & Build Tools
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y meson ninja-build python3-dev python3-mako libxrandr-dev glslang-tools zip pkg-config wget tar
        # Kito tambah pip install mako di siko Jok!
        pip install mako

    - name: Download & Extract Mesa Source Code
      run: |
        wget https://archive.mesa3d.org/mesa-24.1.3.tar.xz
        tar -xf mesa-24.1.3.tar.xz
        mv mesa-24.1.3 mesa-src

    - name: Inject Tweak Adem Adreno 720
      run: |
        cat <<EOF > custom_drirc
        <device driver="turnip">
            <option name="disable_gmem_load" value="true" />
            <option name="vk_xwayland_wait_ready" value="false" />
        </device>
        EOF

    - name: Setup Cross-Compilation File
      run: |
        mkdir -p .github/workflows/
        cat <<EOF > .github/workflows/android-aarch64.txt
        [binaries]
        c = 'aarch64-linux-android33-clang'
        cpp = 'aarch64-linux-android33-clang++'
        ar = 'llvm-ar'
        strip = 'llvm-strip'
        pkgconfig = 'pkg-config'

        [host_machine]
        system = 'android'
        cpu_family = 'aarch64'
        cpu = 'armv8-a'
        endian = 'little'
        EOF

    - name: Add libdrm & zlib Subprojects (Fallback)
      run: |
        cd mesa-src
        mkdir -p subprojects
        [ -f subprojects/libdrm.wrap ] || meson wrap install libdrm
        [ -f subprojects/zlib.wrap ] || meson wrap install zlib

    - name: Configure Meson Build
      run: |
        export PATH=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        cd mesa-src
        meson setup builddir/ \
          --cross-file ../.github/workflows/android-aarch64.txt \
          -Dplatforms=android \
          -Dgallium-drivers= \
          -Dvulkan-drivers=freedreno \
          -Dandroid-stub=true \
          -Dbuildtype=release \
          -Db_lto=true \
          -Dzstd=disabled \
          --force-fallback-for=libdrm,zlib

    - name: Compile Driver Code
      run: |
        export PATH=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        cd mesa-src
        ninja -C builddir/ src/freedreno/vulkan/libvulkan_freedreno.so

    - name: Package Driver to ZIP for Yuzu
      run: |
        mkdir -p output/
        cp mesa-src/builddir/src/freedreno/vulkan/libvulkan_freedreno.so output/
        cp custom_drirc output/.drirc
        echo '{"name": "Mesa Turnip Custom Adreno 720 (Adem Edition)", "driverVersion": "v24.1.3-Custom", "author": "Jok AI Core"}' > output/meta.json
        cd output && zip -r ../turnip-adreno720-custom.zip ./*

    - name: Upload Finished Driver
      uses: actions/upload-artifact@v4
      with:
        name: turnip-adreno720-custom
        path: turnip-adreno720-custom.zip